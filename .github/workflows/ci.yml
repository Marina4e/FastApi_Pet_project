name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8

      - name: Run flake8
        run: flake8 .

# -------------------------------------

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 🔐 ENV
      - name: Set ENV
        run: echo "ENV=test" >> $GITHUB_ENV

      - name: Set test DB
        run: echo "DATABASE_URL=sqlite:///./test.db" >> $GITHUB_ENV

      # 🧹 Всегда чистая БД
      - name: Clean DB
        run: rm -f test.db

      # 🔥 Миграции
      - name: Run migrations
        run: alembic -c alembic.ini upgrade head

      # 🧪 Тесты (подробнее вывод)
      - name: Run tests
        run: pytest -v

      # 📊 (опционально) покрытие
      - name: Coverage
        run: |
          pip install pytest-cov
          pytest --cov=app

      # 🔎 Линтер
      - name: Lint
        run: |
          flake8 .
          black --check .
          isort --check-only .