name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Run lint
        run: |
          flake8 .
          black --check .
          isort --check-only .

# -------------------------------------

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ENV
      - name: Set ENV
        run: echo "ENV=test" >> $GITHUB_ENV

      - name: Set test DB
        run: echo "DATABASE_URL=sqlite:///./test.db" >> $GITHUB_ENV

      # Clean DB
      - name: Clean DB
        run: rm -f test.db

      # MIGRATIONS ✅
      - name: Run migrations (ignore errors)
        run: alembic -c alembic.ini upgrade head || true

      # TESTS
      - name: Run tests
        run: pytest -v
