name: CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 📥 Код
      - name: Checkout
        uses: actions/checkout@v3

      # 🐍 Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      # ⬆️ pip
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # 📦 зависимости
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ⚙️ ENV (важно для Alembic!)
      - name: Set test DB
        run: |
          echo "DATABASE_URL=sqlite:///./test.db" >> $GITHUB_ENV

      # 🔥 Миграции
      - name: Run migrations
        run: alembic upgrade head

      # 🧪 Тесты
      - name: Run tests
        run: pytest
